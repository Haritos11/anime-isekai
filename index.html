<!DOCTYPE html>
<html>
<head>
  <title>Anime Isekai - Planet of Heroes</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #0b0c2a;
      color: white;
      margin: 0;
      padding: 0;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
    }

    .card {
      background: #1a1c4a;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 400px;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00c9aa;
    }
  </style>
</head>

<body>

<h1>🌍 Anime Isekai</h1>
<h2>Planet of Heroes ⚔️</h2>

<div class="card">
  <h3>👤 Hero Creator</h3>
  <p>Φτιάξε τον χαρακτήρα σου</p><script src="js/game.js"></script>
  <button>Create Hero</button>
</div>

<div class="card">
  <h3>⭐ Power System</h3>
  <p>Διάλεξε δυνάμεις</p>
  <button>Choose Power</button>
</div>

<div class="card">
  <h3>🎮 Missions</h3>
  <p>Ξεκίνα αποστολές</p>
  <button>Start Mission</button>
</div>
script src="js/game.js"></script>
</body>
</html>
